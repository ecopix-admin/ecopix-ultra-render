<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleMarket - Video & Foto Elanlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .main-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-container::-webkit-scrollbar { display: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        
        /* Şəkil və Video Ölçüsü */
        .content-media { width: 100%; height: 100%; object-fit: cover; }
        
        .gradient-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,1), transparent); pointer-events: none; z-index: 5; }
        
        /* Swiper (Albom) ayarları */
        .swiper { width: 100%; height: 100%; }
        .swiper-pagination-bullet { background: #fff !important; }

        .glass-btn { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        #infoModal { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="main-container" id="mainContainer">
        </div>

    <div class="fixed bottom-0 left-0 w-full bg-black/80 border-t border-white/10 flex justify-around items-center p-4 pb-8 text-gray-500 z-50 backdrop-blur-md">
        <div class="text-white text-center"><i class="fas fa-home text-2xl"></i></div>
        <div class="text-center"><i class="fas fa-search text-2xl"></i></div>
        <a href="https://t.me/SIZIN_BOT" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg border-4 border-black -top-4 relative">
            <i class="fas fa-plus text-2xl"></i>
        </a>
        <div class="text-center"><i class="fas fa-heart text-2xl"></i></div>
        <div class="text-center"><i class="fas fa-user text-2xl"></i></div>
    </div>

    <div id="infoModal" onclick="this.style.display='none'">
        <div class="flex items-end justify-center min-h-screen">
            <div class="bg-white rounded-t-[40px] w-full p-8 pb-12 relative" onclick="event.stopPropagation()">
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = 'SİZİN_SHEET_ID';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadData() {
            const res = await fetch(JSON_URL);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;
            const container = document.getElementById('mainContainer');

            rows.forEach((row, i) => {
                const type = row.c[8] ? row.c[8].v : 'video'; // I sütununa "video" və ya "photo" yazacaqsınız
                const mediaStr = row.c[0] ? row.c[0].v : '';
                const mediaArr = mediaStr.split(','); // Şəkilləri vergüllə ayırırıq
                
                let mediaHTML = '';
                if(type === 'video') {
                    mediaHTML = `<video class="content-media" loop muted playsinline onclick="this.paused?this.play():this.pause()"><source src="${mediaArr[0]}"></video>`;
                } else {
                    mediaHTML = `
                        <div class="swiper mySwiper">
                            <div class="swiper-wrapper">
                                ${mediaArr.map(img => `<div class="swiper-slide"><img src="${img.trim()}" class="content-media"></div>`).join('')}
                            </div>
                            <div class="swiper-pagination"></div>
                        </div>`;
                }

                const section = `
                <div class="snap-section">
                    ${mediaHTML}
                    <div class="gradient-overlay"></div>
                    <div class="absolute right-4 bottom-44 flex flex-col space-y-6 z-10">
                        <button class="glass-btn w-14 h-14 rounded-full text-white text-2xl"><i class="fas fa-heart"></i></button>
                        <a href="tel:${row.c[4].v}" class="bg-blue-500 w-14 h-14 rounded-full text-white flex items-center justify-center text-2xl"><i class="fas fa-phone"></i></a>
                    </div>
                    <div class="absolute bottom-32 left-4 text-white z-10 w-full pr-20">
                        <span class="bg-green-600 px-4 py-1 rounded-lg font-bold text-xl">${row.c[2].v} AZN</span>
                        <h2 class="text-2xl font-bold mt-2">${row.c[1].v}</h2>
                        <button onclick="showInfo('${row.c[1].v}', '${row.c[2].v}', '${row.c[3].v}', '${row.c[4].v}')" class="mt-4 bg-white text-black py-3 rounded-xl w-full font-bold">Ətraflı Bax</button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', section);
            });

            // Swiper-i aktivləşdir
            new Swiper(".mySwiper", { pagination: { el: ".swiper-pagination", clickable: true } });
            initVideoObserver();
        }

        function initVideoObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.target.tagName === 'VIDEO') e.isIntersecting ? e.target.play() : e.target.pause(); });
            }, {threshold: 0.6});
            document.querySelectorAll('video').forEach(v => observer.observe(v));
        }

        function showInfo(title, price, desc, tel) {
            document.getElementById('modalContent').innerHTML = `<h2 class="text-2xl font-bold">${title}</h2><p class="text-green-600 text-xl font-bold my-2">${price} AZN</p><p class="text-gray-600">${desc}</p><a href="tel:${tel}" class="block mt-6 bg-blue-600 text-white text-center py-4 rounded-2xl font-bold">Zəng Et</a>`;
            document.getElementById('infoModal').style.display = 'block';
        }

        window.onload = loadData;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleMarket - Video & Foto Elanlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .main-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-container::-webkit-scrollbar { display: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        .content-media { width: 100%; height: 100%; object-fit: cover; }
        .gradient-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); pointer-events: none; z-index: 5; }
        .swiper { width: 100%; height: 100%; }
        .swiper-pagination-bullet { background: #fff !important; }
        .glass-btn { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        #infoModal { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="main-container" id="mainContainer"></div>

    <div class="fixed bottom-0 left-0 w-full bg-black/60 border-t border-white/10 flex justify-around items-center p-4 pb-8 text-gray-400 z-50 backdrop-blur-md">
        <div class="text-white text-center"><i class="fas fa-home text-2xl"></i></div>
        <div class="text-center"><i class="fas fa-search text-2xl"></i></div>
        <a href="https://t.me/SIZIN_BOT" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl border-4 border-black -top-5 relative active:scale-90 transition">
            <i class="fas fa-plus text-2xl"></i>
        </a>
        <div class="text-center"><i class="fas fa-heart text-2xl"></i></div>
        <div class="text-center"><i class="fas fa-user text-2xl"></i></div>
    </div>

    <div id="infoModal" onclick="this.style.display='none'">
        <div class="flex items-end justify-center min-h-screen">
            <div class="bg-white rounded-t-[40px] w-full p-8 pb-12 relative shadow-2xl" onclick="event.stopPropagation()">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = 'SİZİN_SHEET_ID_BURAYA';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadData() {
            try {
                const res = await fetch(JSON_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                const container = document.getElementById('mainContainer');

                rows.forEach((row, i) => {
                    const type = row.c[8] ? row.c[8].v.toLowerCase() : 'video';
                    const mediaStr = row.c[0] ? row.c[0].v : '';
                    const mediaArr = mediaStr.split(',');
                    const title = row.c[1] ? row.c[1].v : 'Ads';
                    const price = row.c[2] ? row.c[2].v : '0';
                    const desc = row.c[3] ? row.c[3].v : '';
                    const tel = row.c[4] ? row.c[4].v : '';
                    const wp = row.c[5] ? row.c[5].v : '';

                    let mediaHTML = (type === 'video') 
                        ? `<video class="content-media" loop muted playsinline onclick="this.paused?this.play():this.pause()"><source src="${mediaArr[0].trim()}"></video>`
                        : `<div class="swiper mySwiper"><div class="swiper-wrapper">${mediaArr.map(img => `<div class="swiper-slide"><img src="${img.trim()}" class="content-media"></div>`).join('')}</div><div class="swiper-pagination"></div></div>`;

                    const section = `
                    <div class="snap-section">
                        ${mediaHTML}
                        <div class="gradient-overlay"></div>
                        
                        <div class="absolute right-4 bottom-44 flex flex-col items-center space-y-5 z-20">
                            <button onclick="shareLink('${title}', '${price}')" class="glass-btn w-12 h-12 rounded-full text-white flex items-center justify-center text-xl shadow-xl active:scale-90 transition">
                                <i class="fas fa-share"></i>
                            </button>
                            
                            <button class="glass-btn w-12 h-12 rounded-full text-white flex items-center justify-center text-xl shadow-xl" onclick="this.classList.toggle('text-red-500')">
                                <i class="fas fa-heart"></i>
                            </button>
                            <a href="https://wa.me/${wp}" class="bg-green-500 w-12 h-12 rounded-full text-white flex items-center justify-center text-2xl shadow-xl"><i class="fab fa-whatsapp"></i></a>
                            <a href="tel:${tel}" class="bg-blue-500 w-12 h-12 rounded-full text-white flex items-center justify-center text-xl shadow-xl"><i class="fas fa-phone"></i></a>
                        </div>

                        <div class="absolute bottom-32 left-4 right-20 text-white z-10 p-2">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="bg-green-600 px-4 py-1 rounded-lg font-black text-xl">${price} AZN</span>
                            </div>
                            <h2 class="text-2xl font-black mb-1">${title}</h2>
                            <button onclick="showInfo('${title}', '${price}', '${desc}', '${tel}', '${wp}')" class="mt-4 bg-white text-black py-3.5 px-6 rounded-2xl font-black w-full active:scale-95 transition flex items-center justify-center gap-2 shadow-2xl">
                                <i class="fas fa-eye"></i> Ətraflı Bax
                            </button>
                        </div>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', section);
                });

                new Swiper(".mySwiper", { pagination: { el: ".swiper-pagination", clickable: true } });
                initVideoObserver();
            } catch (e) { console.log(e); }
        }

        // PAYLAŞMA FUNKSİYASI
        function shareLink(title, price) {
            if (navigator.share) {
                navigator.share({
                    title: 'TeleMarket Elan',
                    text: `${title} - ${price} AZN qiymətinə TeleMarket-də!`,
                    url: window.location.href
                }).then(() => console.log('Uğurla paylaşıldı'))
                  .catch((error) => console.log('Paylaşmaq mümkün olmadı', error));
            } else {
                alert("Sizin brauzer paylaşma funksiyasını dəstəkləmir. Linki kopyalayın.");
            }
        }

        function showInfo(title, price, desc, tel, wp) {
            document.getElementById('modalContent').innerHTML = `
                <h3 class="text-3xl font-black mb-2">${title}</h3>
                <div class="text-green-600 text-3xl font-black mb-4">${price} AZN</div>
                <p class="text-gray-600 text-lg mb-8">${desc}</p>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <a href="tel:${tel}" class="bg-blue-600 text-white py-4 rounded-2xl font-bold text-center flex items-center justify-center gap-2 shadow-lg"><i class="fas fa-phone"></i> Zəng</a>
                    <a href="https://wa.me/${wp}" class="bg-green-500 text-white py-4 rounded-2xl font-bold text-center flex items-center justify-center gap-2 shadow-lg"><i class="fab fa-whatsapp"></i> Yaz</a>
                </div>
                <button onclick="shareLink('${title}', '${price}')" class="w-full bg-gray-100 text-gray-800 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-share-alt"></i> Dostunla Paylaş
                </button>
            `;
            document.getElementById('infoModal').style.display = 'block';
        }

        function initVideoObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.target.tagName === 'VIDEO') e.isIntersecting ? e.target.play() : e.target.pause(); });
            }, { threshold: 0.6 });
            document.querySelectorAll('video').forEach(v => observer.observe(v));
        }

        window.onload = loadData;
    </script>
</body>
</html>

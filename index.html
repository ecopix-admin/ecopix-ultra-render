<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Mesh Empire - Full Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --blue: #0088cc; --dark: #0f0f0f; --nav-bg: #181818; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        .header { height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; gap: 10px; }
        .premium-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); background: #333; display:flex; align-items:center; justify-content:center; }
        .search-box { flex: 1; background: #222; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; }

        /* EKRAN BÖLMƏLƏRİ */
        .page { display: none; height: calc(100vh - 120px); overflow-y: auto; padding: 15px; }
        .active-page { display: block; }

        /* OYUNLAR QRİDİ */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .game-card { background: #222; border-radius: 12px; overflow: hidden; text-align: center; border: 1px solid #333; padding-bottom: 10px; }
        .game-card img { width: 100%; height: 120px; object-fit: cover; }
        .game-card b { display: block; margin-top: 8px; font-size: 14px; }

        /* VİDEO FEED (YouTube Stil) */
        .video-item { width: 100%; height: 250px; background: #000; margin-bottom: 15px; border-radius: 10px; position: relative; }
        .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,136,204,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; }

        /* NAVİQASİYA */
        .bottom-nav { height: 60px; display: flex; justify-content: space-around; align-items: center; background: var(--nav-bg); border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%; }
        .nav-item { color: #888; text-align: center; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }

        /* GLOBAL FLASH */
        #flash-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="premium-logo" onclick="triggerGlobalFlash('Samxal', 'https://via.placeholder.com/150')">
            <i class="fas fa-crown" style="color:var(--gold)"></i>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Axtarış...">
        </div>
    </div>

    <div id="video-page" class="page active-page">
        <div class="video-item">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            <div class="video-label">Trend Video @Admin</div>
        </div>
        <div class="video-item">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/3JZ_D3ELwOQ" frameborder="0" allowfullscreen></iframe>
            <div class="video-label">Canlı Futbol #Baku</div>
        </div>
    </div>

    <div id="game-page" class="page">
        <h3 style="color:var(--gold)">Populyar Oyunlar</h3>
        <div class="game-grid">
            <div class="game-card" onclick="window.open('https://krunker.io', '_blank')">
                <img src="https://play-lh.googleusercontent.com/7S8f-p-i7pW0B_2X1T7YnO-_0D3-q-m6C1XF_L7o9xK7zF-W9aW-59N_6x8t0v0Nqw">
                <b>PUBG Style (Krunker)</b>
            </div>
            <div class="game-card" onclick="window.open('https://voxiom.io', '_blank')">
                <img src="https://voxiom.io/img/thumbnail.png">
                <b>Minecraft Battle</b>
            </div>
            <div class="game-card" onclick="window.open('https://poki.com/en/g/subway-surfers', '_blank')">
                <img src="https://img.poki.com/73fa13988a68886c5567e945c43d2c80.png">
                <b>Subway Surfers</b>
            </div>
            <div class="game-card" onclick="window.open('https://poki.com/en/g/soccer-skills-world-cup', '_blank')">
                <img src="https://img.poki.com/5f973e4a-f3d9-48e0-94d0-4965157922d3.png">
                <b>Dünya Kuboku</b>
            </div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h3>Dünya Çatı</h3>
        <div style="background:#222; padding:15px; border-radius:10px; height:70%; overflow-y:auto;">
            <p><b style="color:var(--blue)">Admin:</b> Salam hər kəsə! Xoş gəlmisiniz.</p>
            <p><b>User99:</b> Kim oyun oynamaq istəyir?</p>
        </div>
        <input type="text" placeholder="Mesaj yaz..." style="width:100%; margin-top:10px; padding:10px; border-radius:5px; border:none; background:#333; color:white;">
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="changeTab(this, 'video-page')">
            <i class="fas fa-play"></i>Videolar
        </div>
        <div class="nav-item" onclick="changeTab(this, 'game-page')">
            <i class="fas fa-gamepad"></i>Oyunlar
        </div>
        <div class="nav-item" onclick="changeTab(this, 'chat-page')">
            <i class="fas fa-globe"></i>Dünya Çatı
        </div>
        <div class="nav-item">
            <i class="fas fa-user"></i>Profil
        </div>
    </div>

    <div id="flash-overlay">
        <img id="flash-img" src="" style="width:150px; height:150px; border-radius:50%; border:5px solid var(--gold); box-shadow: 0 0 30px var(--gold);">
        <h1 id="flash-name" style="color:var(--gold); margin-top:20px;"></h1>
        <p>BÜTÜN DÜNYA SƏNİ İZLƏYİR!</p>
        <div style="font-size:30px;">✨🏆✨</div>
    </div>

    <script>
        function changeTab(element, pageId) {
            // Bütün səhifələri gizlət
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            // Seçilən səhifəni göstər
            document.getElementById(pageId).classList.add('active-page');
            
            // Aktiv tab rəngini dəyiş
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function triggerGlobalFlash(name, img) {
            const overlay = document.getElementById('flash-overlay');
            document.getElementById('flash-img').src = img;
            document.getElementById('flash-name').innerText = name + " TƏQDİM EDİR!";
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 5000); // 5 saniyə sonra itir
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Mesh Empire</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --blue: #0088cc; --dark: #0f0f0f; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* --- GLOBAL ANIMASIYA (PREMIUM) --- */
        .global-flash-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.5s forwards;
        }
        .flash-content { text-align: center; animation: zoomIn 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .flash-img { width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--gold); box-shadow: 0 0 50px var(--gold); }
        .gold-rain { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        
        /* --- HEADER & PREMIUM LOGO --- */
        .header { height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; justify-content: space-between; }
        .premium-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); cursor: pointer; transition: 0.3s; }
        .premium-logo:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }

        /* --- VİDEO & YAZI SİSTEMİ --- */
        #main-feed { height: calc(100vh - 120px); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-container { width: 100%; height: 100%; scroll-snap-align: start; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .video-user-label { 
            position: absolute; bottom: 100px; left: 20px; background: rgba(0, 136, 204, 0.8);
            padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 18px;
            animation: slideLeft 0.5s ease; border-left: 5px solid var(--gold);
        }

        /* --- OYUN PORTALI (100+ OYUN) --- */
        #game-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; overflow-y: auto; height: 100%; }
        .game-item { background: #222; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; }
        .game-item img { width: 100%; border-radius: 8px; }

        /* --- NAVİQASYON --- */
        .nav { height: 60px; display: flex; justify-content: space-around; align-items: center; background: #111; }
        .nav i { font-size: 24px; color: #888; cursor: pointer; }
        .nav i.active { color: var(--blue); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); } to { transform: scale(1.2); } }
        @keyframes slideLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="flash-box"></div>

    <div class="header">
        <img src="https://via.placeholder.com/100" class="premium-logo" onclick="testFlash()" title="Reklam Ver">
        <div style="background:#222; border-radius:20px; padding:5px 15px; flex:1; margin:0 15px;">
            <input type="text" id="yt-search" placeholder="Axtar və Trend et..." style="background:none; border:none; color:white; width:100%; outline:none;">
        </div>
        <i class="fas fa-crown" style="color:var(--gold); font-size:20px;"></i>
    </div>

    <div id="main-feed">
        </div>

    <div id="game-grid">
        <div class="game-item" onclick="playGame('https://krunker.io')"><img src="https://static.gamedistribution.com/games/images/5db139b999d343f885e921d7b1d1e4e4-512x512.jpeg">PUBG Style</div>
        <div class="game-item" onclick="playGame('https://voxiom.io')"><img src="https://voxiom.io/img/thumbnail.png">Minecraft War</div>
        <div class="game-item" onclick="playGame('https://poki.com/en/g/subway-surfers')"><img src="https://img.poki.com/73fa13988a68886c5567e945c43d2c80.png">Subway Surfers</div>
        </div>

    <div class="nav">
        <i class="fas fa-play active" onclick="showTab('video')"></i>
        <i class="fas fa-gamepad" onclick="showTab('games')"></i>
        <i class="fas fa-globe" onclick="showTab('world')"></i>
        <i class="fas fa-comment-alt" onclick="showTab('chat')"></i>
    </div>

<script>
    const API_KEY = 'YOUR_YOUTUBE_API_KEY'; // Bura öz API Key-ini qoy

    // 1. Qlobal Reklam Animasiyası (Test etmək üçün loqoya bas)
    function testFlash() {
        const flashBox = document.getElementById('flash-box');
        flashBox.innerHTML = `
            <div class="global-flash-overlay">
                <div class="flash-content">
                    <img src="https://via.placeholder.com/150" class="flash-img">
                    <h1 style="color:var(--gold); margin-top:20px;">SAMXAL TƏQDİM EDİR!</h1>
                    <p>Bu günün kralı seçildi!</p>
                    <div style="font-size:40px;">🎊✨🏆✨🎊</div>
                </div>
            </div>
        `;
        // Qızılı yağış səsi və ya effekti bura əlavə oluna bilər
        setTimeout(() => flashBox.innerHTML = '', 6000);
    }

    // 2. Video Üzərinə Yazı Qoymaq (Trend funksiyası)
    function renderVideos(items) {
        const feed = document.getElementById('main-feed');
        feed.innerHTML = '';
        items.forEach(item => {
            const vId = item.id.videoId;
            const container = document.createElement('div');
            container.className = 'video-container';
            container.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${vId}?autoplay=0&controls=0&modestbranding=1"></iframe>
                <div class="video-user-label">@Samxal: "Bu mahnı hər kəsə gəlsin!" 🔥</div>
                <div style="position:absolute; right:15px; bottom:150px; display:flex; flex-direction:column; gap:20px;">
                    <i class="fas fa-heart" style="font-size:30px;"></i>
                    <i class="fas fa-paper-plane" style="font-size:30px; color:var(--blue);"></i>
                </div>
            `;
            feed.appendChild(container);
        });
    }

    // 3. Tab Keçidləri
    function showTab(tab) {
        document.getElementById('main-feed').style.display = tab === 'video' ? 'block' : 'none';
        document.getElementById('game-grid').style.display = tab === 'games' ? 'grid' : 'none';
        // Digər tablar üçün...
    }

    function playGame(url) {
        window.open(url, '_blank'); // Brauzer oyunları üçün ən stabil yol
    }

    // İlk yükləmə simulyasiyası
    // loadTrendingVideos(); // Bu funksiyanı əvvəlki koddan bura bağla
</script>
</body>
</html>

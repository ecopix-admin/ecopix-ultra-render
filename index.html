<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - STABIL AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-camera gps-camera="minDistance: 5;" rotation-reader fov="90"></a-camera>

        <a-entity 
            id="portal-node"
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="20 20 20" 
            position="0 5 0" 
            look-at="[gps-camera]">
            
            <a-plane color="#007bff" width="4" height="2.5" opacity="0.95" material="shader: flat;"></a-plane>

            <a-text value="CANLI MEQALE PORTALI" align="center" position="0 0.8 0.1" width="5" color="#fff" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
            
            <a-text value="Bitcoin haqqinda oxumaq ucun\nekrana TOXUNUN" align="center" position="0 -0.2 0.1" width="3.5" color="#fff"></a-text>

            <a-plane color="#ff0050" width="2" height="0.5" position="0 -0.8 0.1"></a-plane>
            <a-text value="MEQALENI AC" align="center" position="0 -0.8 0.15" width="4" color="#fff"></a-text>
        </a-entity>

    </a-scene>

    <script>
        // Ekrana toxunanda saytı açmaq üçün (Brauzer xətası olmadan)
        window.addEventListener('click', function() {
            window.location.href = "https://www.coingecko.com/en/coins/bitcoin";
        });
    </script>
</body>
</html>

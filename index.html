<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueChat PRO</title>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<style>
:root{
  --blue:#0088cc;
}
body{margin:0;font-family:sans-serif;background:#f0f2f5}

/* HEADER */
.header{
  background:var(--blue);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* CHAT */
#chat{padding:10px;height:75vh;overflow:auto}

.msg{
  padding:8px 12px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.sent{background:#d1ecff;margin-left:auto}
.recv{background:white}

/* INPUT */
.input{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
}

.input input{
  flex:1;
  padding:15px;
  border:none;
}

.btn{
  background:var(--blue);
  color:white;
  padding:15px;
  cursor:pointer;
}

/* CALL SCREEN */
#call{
  display:none;
  position:fixed;
  inset:0;
  background:black;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#myVideo{
  width:120px;
  position:absolute;
  bottom:10px;
  right:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>ID: <span id="id"></span></div>
  <div>
    <button onclick="connect()">Qoşul</button>
    <button onclick="startCall()">📞</button>
  </div>
</div>

<div id="chat"></div>

<div class="input">
  <input id="msg">
  <div class="btn" onclick="send()">➤</div>
  <div class="btn" onclick="record()">🎤</div>
</div>

<div id="call">
  <video id="remoteVideo" autoplay></video>
  <video id="myVideo" autoplay muted></video>
  <button onclick="endCall()" style="position:absolute;bottom:20px;left:50%">❌</button>
</div>

<script>
// ID
let myId = localStorage.getItem("id");
if(!myId){
  myId = Math.floor(100000+Math.random()*900000);
  localStorage.setItem("id",myId);
}
document.getElementById("id").innerText = myId;

// Peer
let peer = new Peer(myId);
let conn;
let currentCall;
let localStream;

// CONNECT
function connect(){
  let id = prompt("ID:");
  conn = peer.connect(id);
  conn.on("data",data=>addMsg(data,"recv"));
}

// SEND
function send(){
  let val = document.getElementById("msg").value;
  conn.send(val);
  addMsg(val,"sent");
}

// UI
function addMsg(t,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=t;
  chat.appendChild(d);
}

// RECEIVE
peer.on("connection",c=>{
  conn=c;
  c.on("data",d=>addMsg(d,"recv"));
});

// 🎤 VOICE
let rec;
let chunks=[];
async function record(){
  let stream=await navigator.mediaDevices.getUserMedia({audio:true});
  rec=new MediaRecorder(stream);
  rec.start();
  chunks=[];
  rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=()=>{
    let blob=new Blob(chunks);
    let url=URL.createObjectURL(blob);
    conn.send({audio:url});
    addAudio(url,"sent");
  };
  setTimeout(()=>rec.stop(),3000);
}

// AUDIO UI
function addAudio(src,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=`<audio controls src="${src}"></audio>`;
  chat.appendChild(d);
}

// 🎥 CALL
async function startCall(){
  let id = prompt("Zəng ID:");
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  myVideo.srcObject = localStream;

  let call = peer.call(id,localStream);
  currentCall=call;

  call.on("stream",s=>{
    remoteVideo.srcObject=s;
  });

  call.style="block";
  document.getElementById("call").style.display="block";
}

// RECEIVE CALL
peer.on("call",async call=>{
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  call.answer(localStream);

  myVideo.srcObject = localStream;

  call.on("stream",s=>{
    remoteVideo.srcObject=s;
  });

  currentCall=call;
  document.getElementById("call").style.display="block";
});

// END
function endCall(){
  if(currentCall) currentCall.close();
  document.getElementById("call").style.display="none";
}
</script>

</body>
</html>

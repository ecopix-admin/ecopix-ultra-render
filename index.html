<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - LIVE WEB AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-camera gps-camera="minDistance: 5;" rotation-reader></a-camera>

        <a-entity 
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="15 15 15" 
            look-at="[gps-camera]">
            
            <a-plane color="#1a1a1a" width="4" height="3" opacity="0.9"></a-plane>

            <a-text value="CANLI KRIPTO BIRJASI" align="center" position="0 1.2 0.1" width="4" color="#00ff00"></a-text>

            <a-box position="0 0 0.1" width="2.5" height="0.8" color="#ff0050" 
                   class="clickable" 
                   onclick="window.location.href='https://www.coingecko.com/en/coins/bitcoin'">
                <a-text value="BITCOIN QIYMETINE BAX" align="center" position="0 0 0.55" width="3.5" color="#fff"></a-text>
            </a-box>

            <a-text value="Bu panel havada canli internet portalidir" align="center" position="0 -1.2 0.1" width="2.5" color="#bbb"></a-text>
        </a-entity>

    </a-scene>

    <script>
        // Toxunuşu qeydə almaq üçün
        window.addEventListener('click', function () {
            // AR obyektinə klikləyəndə sayta yönləndirmə funksiyası burada aktivləşir
        });
    </script>
</body>
</html>

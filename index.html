<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Mesh - WhatsApp Style</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --wa-green: #075E54;
            --wa-light-green: #25D366;
            --wa-bg: #ece5dd;
            --wa-white: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; }
        
        /* Header */
        .header { background: var(--wa-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 20px; }

        /* Tabs */
        .tabs { background: var(--wa-green); display: flex; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: bold; font-size: 14px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        /* User ID Bar */
        .my-id-bar { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; font-size: 13px; color: #666; }
        #my-id { font-weight: bold; color: var(--wa-green); }

        /* Chat List */
        .chat-list { background: white; height: calc(100vh - 150px); overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; border-bottom: 1px solid #f2f2f2; align-items: center; cursor: pointer; }
        .chat-avatar { width: 50px; height: 50px; background: #ccc; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .chat-info { flex: 1; }
        .chat-info h4 { margin: 0; font-size: 16px; color: #000; }
        .chat-info p { margin: 5px 0 0; font-size: 13px; color: #666; }

        /* Floating Action Button */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--wa-light-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }

        /* Chat Window (Hidden by default) */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-bg); display: none; flex-direction: column; z-index: 200; }
        .chat-header { background: var(--wa-green); color: white; padding: 10px; display: flex; align-items: center; }
        .back-btn { margin-right: 15px; cursor: pointer; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 15px; position: relative; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg.received { align-self: flex-start; background: white; }

        .input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; }
        .input-area input { flex: 1; border: none; padding: 10px; border-radius: 20px; margin: 0 10px; outline: none; }
        .send-btn { color: var(--wa-green); font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>Eco Mesh</h2>
    <div>
        <i class="fas fa-search" style="margin-right: 20px;"></i>
        <i class="fas fa-ellipsis-v"></i>
    </div>
</div>

<div class="tabs">
    <div class="tab active">Söhbətlər</div>
    <div class="tab">Status</div>
    <div class="tab">Zənglər</div>
</div>

<div class="my-id-bar">Sənin ID: <span id="my-id">Yüklənir...</span></div>

<div class="chat-list" id="chat-list">
    </div>

<div class="fab" onclick="addNewContact()">
    <i class="fas fa-comment-dots"></i>
</div>

<div id="chat-window">
    <div class="chat-header">
        <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
        <div class="chat-avatar" style="width: 35px; height: 35px; margin-right: 10px;"><i class="fas fa-user"></i></div>
        <h4 id="chat-with-name">Dost</h4>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <i class="far fa-smile"></i>
        <input type="text" id="msg-input" placeholder="Mesaj yazın...">
        <i class="fas fa-paperclip" style="margin-right: 15px; color: #666;"></i>
        <div class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></div>
    </div>
</div>

<script>
    const peer = new Peer();
    let currentConn = null;

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
    });

    // Kontakt əlavə etmək funksiyası
    function addNewContact() {
        const friendId = prompt("Dostunun ID-sini daxil et:");
        if (friendId) {
            const list = document.getElementById('chat-list');
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.innerHTML = `
                <div class="chat-avatar"><i class="fas fa-user"></i></div>
                <div class="chat-info">
                    <h4>ID: ${friendId}</h4>
                    <p>Söhbətə başlamaq üçün klikləyin</p>
                </div>
            `;
            item.onclick = () => openChat(friendId);
            list.appendChild(item);
        }
    }

    function openChat(id) {
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-with-name').innerText = "ID: " + id;
        currentConn = peer.connect(id);
        
        currentConn.on('open', () => {
            console.log("Qoşuldu!");
        });
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const msg = input.value;
        if (msg && currentConn) {
            currentConn.send(msg);
            displayMessage(msg, 'sent');
            input.value = '';
        }
    }

    peer.on('connection', conn => {
        currentConn = conn;
        conn.on('data', data => {
            displayMessage(data, 'received');
            document.getElementById('chat-window').style.display = 'flex';
        });
    });

    function displayMessage(msg, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = msg;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
</script>

</body>
</html>

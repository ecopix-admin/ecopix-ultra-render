<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleMarket PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        .main-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-container::-webkit-scrollbar { display: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Şəkillər üçün Swiper lazımdırsa bura CSS əlavə edə bilərik */
        
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%, transparent 70%, rgba(0,0,0,0.5) 100%); pointer-events: none; }
        
        /* Sağ tərəf düymələri - Yuxarı qaldırıldı */
        .side-bar { position: absolute; right: 15px; bottom: 180px; display: flex; flex-direction: column; gap: 18px; z-index: 50; }
        .action-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 22px; color: white; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .btn-label { font-size: 10px; margin-top: 2px; font-weight: 500; }

        /* Məlumat bölməsi - Alt menyudan yuxarı çəkildi */
        .info-box { position: absolute; bottom: 165px; left: 15px; right: 90px; color: white; z-index: 40; }
        .price-tag { background: #16a34a; color: white; padding: 6px 14px; border-radius: 6px; font-weight: 900; font-size: 18px; display: inline-block; margin-bottom: 10px; }
        .badge-new { background: rgba(255,255,255,0.2); font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-left: 8px; text-transform: uppercase; }
        
        .detail-btn { background: white; color: black; padding: 14px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="main-container" id="feed"></div>

    <div class="fixed bottom-0 left-0 w-full h-[90px] bg-black border-t border-white/5 flex justify-around items-center z-[100] pb-6 px-2">
        <div class="flex flex-col items-center text-white"><i class="fas fa-home text-2xl"></i><span class="text-[10px] mt-1 font-medium">Əsas</span></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-search text-2xl"></i><span class="text-[10px] mt-1 font-medium">Axtar</span></div>
        <div class="bg-blue-600 w-[60px] h-[45px] rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-500/30"><i class="fas fa-plus"></i></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-heart text-2xl"></i><span class="text-[10px] mt-1 font-medium">Seçilmişlər</span></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-user text-2xl"></i><span class="text-[10px] mt-1 font-medium">Profil</span></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="flex items-end justify-center h-full">
            <div class="bg-white w-full rounded-t-[40px] p-8 pb-14 animate-slide-up relative" onclick="event.stopPropagation()">
                <button onclick="closeModal()" class="absolute right-6 top-6 text-gray-400 text-xl"><i class="fas fa-times"></i></button>
                <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-8"></div>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script>
        const ads = [
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-person-holding-an-iphone-34444-large.mp4', title: 'iPhone 15 Pro Max', price: '2450', desc: 'Ölçü 256GB. Blue Titanium. Qarantiya davam edir. Bakı, Nərimanov.', tel: '994501112233', wp: '994501112233' },
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-fast-pacing-running-shoes-in-a-field-34568-large.mp4', title: 'Nike Air Max 270', price: '180', desc: 'Ölçü 43. Cəmi 2 dəfə geyinilib. Xaricdən alınıb. Orijinal qutusunda təqdim olunur.', tel: '994505554433', wp: '994505554433' }
        ];

        function renderAds() {
            const container = document.getElementById('feed');
            ads.forEach((ad, i) => {
                const section = `
                <div class="snap-section">
                    <video loop muted playsinline onclick="this.paused?this.play():this.pause()"><source src="${ad.video}"></video>
                    <div class="overlay"></div>
                    
                    <div class="side-bar">
                        <button class="action-btn" onclick="this.style.color='red'"><i class="fas fa-heart"></i><span class="btn-label">Bəyən</span></button>
                        <button class="action-btn" onclick="shareAd('${ad.title}', '${ad.price}')"><i class="fas fa-share"></i><span class="btn-label">Paylaş</span></button>
                        <a href="https://wa.me/${ad.wp}" class="action-btn text-green-500"><i class="fab fa-whatsapp text-3xl"></i></a>
                        <a href="tel:${ad.tel}" class="action-btn text-blue-500"><i class="fas fa-phone text-2xl"></i></a>
                    </div>

                    <div class="info-box">
                        <div class="flex items-center">
                            <div class="price-tag">${ad.price} AZN</div>
                            <span class="badge-new font-bold">YENİ</span>
                        </div>
                        <h2 class="text-2xl font-bold mt-1">${ad.title}</h2>
                        <p class="text-gray-300 text-sm opacity-80 mt-1">Bakı, Nərimanov • 2 saat əvvəl</p>
                        <button onclick="openModal(${i})" class="detail-btn active:scale-95 transition">
                            <i class="fas fa-info-circle"></i> Ətraflı Məlumat
                        </button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', section);
            });
        }

        function openModal(index) {
            const ad = ads[index];
            document.getElementById('modalBody').innerHTML = `
                <h3 class="text-3xl font-black text-gray-900 mb-2">${ad.title}</h3>
                <div class="text-green-600 text-3xl font-black mb-6">${ad.price} AZN</div>
                <p class="text-gray-500 text-lg leading-relaxed mb-10 font-medium">${ad.desc}</p>
                <div class="grid grid-cols-2 gap-4">
                    <a href="tel:${ad.tel}" class="bg-blue-600 text-white py-5 rounded-2xl font-black text-center flex items-center justify-center gap-2 shadow-lg"><i class="fas fa-phone"></i> Zəng Et</a>
                    <a href="https://wa.me/${ad.wp}" class="bg-green-500 text-white py-5 rounded-2xl font-black text-center flex items-center justify-center gap-2 shadow-lg"><i class="fab fa-whatsapp text-2xl"></i> Yaz</a>
                </div>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function shareAd(title, price) {
            if (navigator.share) {
                navigator.share({ title: 'TeleMarket', text: `${title} - ${price} AZN. Bax:`, url: window.location.href });
            }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.play(); else e.target.pause(); });
        }, { threshold: 0.6 });

        window.onload = () => {
            renderAds();
            document.querySelectorAll('video').forEach(v => observer.observe(v));
        };
    </script>
</body>
</html>

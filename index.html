<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Mesh Empire - Short & Voice</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0088cc; --gold: #ffd700; --bg: #0a0a0b; --glass: rgba(255,255,255,0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }

        /* HEADER */
        header { height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--glass); justify-content: space-between; }
        
        /* SHORTS FEED */
        #shorts-container { height: calc(100vh - 130px); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .short-video { width: 100%; height: 100%; scroll-snap-align: start; position: relative; background: #000; }
        .short-video iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }
        .short-overlay { position: absolute; bottom: 80px; left: 15px; z-index: 10; text-shadow: 2px 2px 5px black; }

        /* ARENA & VOICE */
        .page { display: none; height: calc(100vh - 130px); overflow-y: auto; padding: 15px; }
        .active-page { display: block; }
        .voice-card { background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid var(--primary); margin-bottom: 20px; }
        
        /* GAME GRID */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .game-item { background: #222; border-radius: 10px; overflow: hidden; text-align: center; cursor: pointer; border: 1px solid #333; }
        .game-item img { width: 100%; height: 100px; object-fit: cover; }

        /* OYUN MODAL (Oyun daxildə açılsın deyə) */
        #game-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        #close-game { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 10px; border-radius: 5px; z-index: 2100; }

        /* NAVBAR */
        nav { height: 70px; display: flex; justify-content: space-around; align-items: center; background: #111; border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%; }
        .nav-link { color: #666; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div style="border: 2px solid var(--gold); border-radius: 50%; padding: 5px;" onclick="triggerFlash()">
            <i class="fas fa-crown" style="color:var(--gold)"></i>
        </div>
        <div style="background:#222; border-radius:15px; padding:5px 15px; flex:1; margin:0 10px;">
            <input type="text" placeholder="YouTube Shorts Axtar..." style="background:none; border:none; color:white; width:100%;">
        </div>
    </header>

    <main>
        <div id="video-page" class="page active-page" style="padding:0;">
            <div id="shorts-container">
                </div>
        </div>

        <div id="game-page" class="page">
            <div class="voice-card">
                <h3 style="margin-top:0; color:var(--gold)">🎙️ Səsli Otaq</h3>
                <p>Sənin ID: <b id="my-id" style="color:var(--primary); font-size: 20px;">-----</b></p>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="friend-id" placeholder="Dostunun ID-si" style="flex:1; padding:8px; border-radius:5px; border:1px solid #444; background:#111; color:white;">
                    <button onclick="callFriend()" style="background:var(--primary); border:none; color:white; padding:10px; border-radius:5px;">Qoşul</button>
                </div>
                <button id="mic-btn" onclick="toggleMic()" style="width:100%; margin-top:10px; padding:10px; border-radius:5px; border:none; background:#ff3b30; color:white;">
                    <i class="fas fa-microphone-slash"></i> Mikrofonu Aç
                </button>
            </div>

            <div class="game-grid">
                <div class="game-item" onclick="playGame('https://krunker.io')"><img src="https://via.placeholder.com/150/111/ffd700?text=PUBG"><b>PUBG Pro</b></div>
                <div class="game-item" onclick="playGame('https://voxiom.io')"><img src="https://via.placeholder.com/150/111/0088cc?text=Minecraft"><b>MC War</b></div>
                <div class="game-item" onclick="playGame('https://poki.com/en/g/subway-surfers')"><img src="https://img.poki.com/73fa13988a68886c5567e945c43d2c80.png"><b>Subway</b></div>
                <div class="game-item" onclick="playGame('https://poki.com/en/g/soccer-skills-world-cup')"><img src="https://img.poki.com/5f973e4a-f3d9-48e0-94d0-4965157922d3.png"><b>Futbol</b></div>
            </div>
        </div>
    </main>

    <div id="game-modal">
        <button id="close-game" onclick="closeGame()">X Bağla</button>
        <iframe id="game-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <nav>
        <div class="nav-link active" onclick="showPage('video-page', this)"><i class="fas fa-play"></i><br>Shorts</div>
        <div class="nav-link" onclick="showPage('game-page', this)"><i class="fas fa-gamepad"></i><br>Arena</div>
        <div class="nav-link" onclick="alert('Tezliklə!')"><i class="fas fa-globe"></i><br>Dünya</div>
    </nav>

    <script>
        // 1. SHORTS VİDEOLARI (10 ƏDƏD)
        const vIds = ["mK-0O8T9m_o", "p_Yp_S6M9S0", "3JZ_D3ELwOQ", "l_S-b2aL_H8", "X_Y_Z12345", "5JZ_D3ELwOQ", "dQw4w9WgXcQ", "7JZ_D3ELwOQ", "8JZ_D3ELwOQ", "9JZ_D3ELwOQ"];
        const container = document.getElementById('shorts-container');
        vIds.forEach(id => {
            container.innerHTML += `
                <div class="short-video">
                    <iframe src="https://www.youtube.com/embed/${id}?autoplay=0&controls=0&loop=1&playlist=${id}&modestbranding=1"></iframe>
                    <div class="short-overlay"><h4>@User: Bu möhtəşəmdir! 🔥</h4></div>
                </div>`;
        });

        // 2. SADƏ ID SİSTEMİ (6 Rəqəmli)
        const simpleId = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(simpleId);
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // 3. SƏS SİSTEMİ
        let myStream;
        async function toggleMic() {
            if (!myStream) {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('mic-btn').style.background = "green";
                document.getElementById('mic-btn').innerHTML = '<i class="fas fa-microphone"></i> Mikrofon Açıq';
            }
        }

        function callFriend() {
            const fId = document.getElementById('friend-id').value;
            const call = peer.call(fId, myStream);
            call.on('stream', stream => { playStream(stream); });
        }

        peer.on('call', call => {
            call.answer(myStream);
            call.on('stream', stream => { playStream(stream); });
        });

        function playStream(stream) {
            let audio = new Audio();
            audio.srcObject = stream;
            audio.play();
        }

        // 4. OYUNU DAXİLDƏ AÇMAQ (Səs kəsilməsin deyə)
        function playGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-modal').style.display = 'block';
        }
        function closeGame() {
            document.getElementById('game-modal').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>

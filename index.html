<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video Elanlar - TikTok Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        .video-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox üçün skrolu gizlət */
        }
        .video-container::-webkit-scrollbar { display: none; } /* Chrome üçün skrolu gizlət */

        .video-section {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
        }
        video {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
        }
        /* MODALIN DÜZƏLİŞİ */
        #infoModal {
            display: none; /* İlkin olaraq gizli */
            position: fixed;
            z-index: 9999; /* Hər şeyin üstündə durması üçün */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="video-container" id="videoContainer">

        <div class="video-section">
            <video loop muted playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-holding-a-smartphone-with-a-blue-screen-34446-large.mp4" type="video/mp4">
            </video>
            <div class="gradient-overlay"></div>
            
            <div class="absolute right-4 bottom-40 flex flex-col items-center space-y-6 text-white text-3xl">
                <i class="fas fa-heart"></i>
                <span class="text-sm">1.2k</span>
                <i class="fas fa-share"></i>
                <span class="text-sm">340</span>
            </div>

            <div class="absolute bottom-24 left-4 text-white w-3/4 p-4 z-10">
                <div class="bg-green-600 px-4 py-1 rounded-full inline-block text-lg font-bold mb-2">1450 AZN</div>
                <h2 class="text-xl font-bold">iPhone 13 Pro Max</h2>
                <p class="text-sm opacity-80">İdeal vəziyyətdə, cızığı yoxdur.</p>
                <button onclick="openModal('elan1')" class="mt-3 bg-white text-black px-6 py-2 rounded-lg font-bold w-full">Ətraflı Bax</button>
            </div>
        </div>

        <div class="video-section">
            <video loop muted playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-running-shoes-in-slow-motion-42666-large.mp4" type="video/mp4">
            </video>
            <div class="gradient-overlay"></div>
            
            <div class="absolute right-4 bottom-40 flex flex-col items-center space-y-6 text-white text-3xl">
                <i class="fas fa-heart"></i>
                <span class="text-sm">890</span>
                <i class="fas fa-share"></i>
                <span class="text-sm">120</span>
            </div>

            <div class="absolute bottom-24 left-4 text-white w-3/4 p-4 z-10">
                <div class="bg-green-600 px-4 py-1 rounded-full inline-block text-lg font-bold mb-2">180 AZN</div>
                <h2 class="text-xl font-bold">Nike Air Max 270</h2>
                <p class="text-sm opacity-80">Ölçü 43. Cəmi 2 dəfə geyinilib.</p>
                <button onclick="openModal('elan2')" class="mt-3 bg-white text-black px-6 py-2 rounded-lg font-bold w-full">Ətraflı Bax</button>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 w-full bg-black border-t border-gray-900 flex justify-around p-4 text-gray-500 z-50">
        <div class="text-white text-center"><i class="fas fa-home block"></i><span class="text-[10px]">Ana Səhifə</span></div>
        <div class="text-center"><i class="fas fa-search block"></i><span class="text-[10px]">Axtar</span></div>
        <div class="bg-red-600 text-white px-5 py-1 rounded-xl self-center"><i class="fas fa-plus"></i></div>
        <div class="text-center"><i class="fas fa-comment block"></i><span class="text-[10px]">Mesajlar</span></div>
        <div class="text-center"><i class="fas fa-user block"></i><span class="text-[10px]">Profil</span></div>
    </div>

    <div id="infoModal" onclick="closeModalOutside(event)">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-3xl w-full max-w-sm relative p-6 shadow-2xl animate-bounce-short">
                <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl text-gray-400 hover:text-black">&times;</button>
                <div id="modalContent">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('videoContainer');
        const videos = document.querySelectorAll('video');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play();
                } else {
                    entry.target.pause();
                    entry.target.currentTime = 0;
                }
            });
        }, { threshold: 0.5 });

        videos.forEach(video => observer.observe(video));

        const elanlarMəlumatı = {
            'elan1': {
                başlıq: 'iPhone 13 Pro Max - 256GB',
                qiymət: '1450 AZN',
                təsvir: 'Tel ideal vəziyyətdədir. Heç bir problemi yoxdur. Qutusu var. Pil 92%.',
                tel: '+994 50 123 45 67'
            },
            'elan2': {
                başlıq: 'Nike Air Max 270 - Orijinal',
                qiymət: '180 AZN',
                təsvir: 'Ölçü 43. Cəmi 2 dəfə geyinilib. Xaricdən alınıb.',
                tel: '+994 70 987 65 43'
            }
        };

        function openModal(id) {
            const data = elanlarMəlumatı[id];
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="text-center">
                    <div class="bg-green-100 text-green-700 text-2xl font-bold py-2 rounded-xl mb-4">${data.qiymət}</div>
                    <h2 class="text-xl font-bold mb-2">${data.başlıq}</h2>
                    <p class="text-gray-600 text-sm mb-6">${data.təsvir}</p>
                    <a href="tel:${data.tel}" class="block bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">
                        <i class="fas fa-phone mr-2"></i> Zəng Et
                    </a>
                </div>
            `;
            document.getElementById('infoModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        function closeModalOutside(event) {
            if (event.target.id === "infoModal") {
                closeModal();
            }
        }
    </script>
</body>
</html>

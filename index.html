<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - FINAL PORTAL</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        /* Klikləyəndə açılan canlı internet səhifəsi */
        #web-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; flex-direction: column;
        }
        #web-frame { flex-grow: 1; border: none; width: 100%; }
        #top-bar { background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; font-family: sans-serif; }
        .btn-close { background: white; color: #007bff; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="web-overlay">
        <div id="top-bar">
            <span>GÖREN GÖZ - CANLI MƏLUMAT</span>
            <button class="btn-close" onclick="document.getElementById('web-overlay').style.display='none'">X</button>
        </div>
        <iframe id="web-frame" src=""></iframe>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera gps-camera="minDistance: 3;" rotation-reader></a-camera>

        <a-entity 
            id="portal-node"
            gps-entity-place="latitude: 40.350554; longitude: 49.965319;" 
            scale="10 10 10" 
            look-at="[gps-camera]">
            
            <a-plane color="#007bff" width="4" height="2.5" opacity="0.9"></a-plane>

            <a-text value="INTERNET PORTALI" align="center" position="0 0.8 0.1" width="5" color="#fff"></a-text>
            <a-text value="Sayti acmaq ucun\nekrana bir defe toxunun" align="center" position="0 -0.2 0.1" width="3.5" color="#eee"></a-text>

            <a-box position="0 -1 0.05" width="4" height="0.1" depth="0.01" color="#ffffff"></a-box>
        </a-entity>
    </a-scene>

    <script>
        // Ekrana toxunanda saytı açan funksiya
        window.onclick = function() {
            const overlay = document.getElementById('web-overlay');
            const frame = document.getElementById('web-frame');
            
            if (overlay.style.display !== 'flex') {
                overlay.style.display = 'flex';
                // Sənin internetdəki səhifən və ya birja linki
                frame.src = "https://www.coingecko.com/en/coins/bitcoin"; 
            }
        };
    </script>
</body>
</html>

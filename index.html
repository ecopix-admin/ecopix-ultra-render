<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>GÖREN GÖZ - TIKTOK PORTAL</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="tiktok-icon" src="https://img.icons8.com/color/512/tiktok.png">
        </a-assets>

        <a-camera gps-camera="minDistance: 5;" rotation-reader></a-camera>

        <a-entity 
            gps-entity-place="latitude: 40.429127; longitude: 49.852446;" 
            scale="15 15 15" 
            look-at="[gps-camera]">
            
            <a-image src="#tiktok-icon" width="2" height="2" position="0 1 0" 
                     animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-image>

            <a-plane color="#000000" width="3" height="0.6" position="0 -0.5 0.1" opacity="0.9"></a-plane>
            <a-text value="TIKTOK-U AC" align="center" position="0 -0.5 0.2" width="5" color="#fff"></a-text>
        </a-entity>

    </a-scene>

    <script>
        // Ekrana toxunanda birbaşa TikTok-u açır
        window.addEventListener('click', function() {
            window.location.href = "https://www.tiktok.com";
        });
    </script>
</body>
</html>

<style>
    /* Splash Screen Dizaynı */
    #splash-screen {
        position: fixed;
        inset: 0;
        background: var(--main-blue);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        color: white;
        transition: opacity 0.5s ease;
    }
    .loader-logo {
        font-size: 50px;
        margin-bottom: 20px;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* Giriş Kartı Dizaynı */
    #login-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1500;
    }
    .login-card {
        background: white;
        padding: 30px;
        border-radius: 25px;
        width: 90%;
        max-width: 350px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .login-card h2 { color: var(--main-blue); margin-bottom: 10px; }
    .id-input-field {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border: 2px solid #eee;
        border-radius: 12px;
        font-size: 18px;
        text-align: center;
        outline: none;
    }
    .id-input-field:focus { border-color: var(--main-blue); }
    .start-btn {
        background: var(--main-blue);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
    }
</style>

<div id="splash-screen">
    <div class="loader-logo"><i class="fas fa-network-wired"></i></div>
    <h2>Eco Mesh Ultra</h2>
    <p>Təhlükəsiz və Sürətli P2P</p>
</div>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield" style="font-size: 40px; color: var(--main-blue);"></i>
        <h2>Xoş Gəldiniz</h2>
        <p>Söhbətə başlamaq üçün dostunun ID kodunu daxil et</p>
        <input type="number" id="target-id-input" class="id-input-field" placeholder="Dostun ID-si">
        <button class="start-btn" onclick="initializeConnection()">Söhbətə Başla</button>
        <p style="font-size: 12px; color: #888; margin-top: 15px;">Sənin ID kodun: <b id="display-my-id">...</b></p>
    </div>
</div>

<script>
    // Splash screen-i 2 saniyə sonra bağla
    setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
        }, 500);
    }, 2000);

    // Sənin ID-ni giriş kartında göstər
    document.getElementById('display-my-id').innerText = myId;

    function initializeConnection() {
        const inputId = document.getElementById('target-id-input').value;
        if(inputId) {
            targetId = inputId;
            conn = peer.connect(targetId);
            setupConn();
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-name').innerText = "ID: " + targetId;
        } else {
            alert("Zəhmət olmasa ID daxil edin!");
        }
    }
</script>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleMarket PRO - Canlı Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        .main-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .main-container::-webkit-scrollbar { display: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.4) 100%); pointer-events: none; }
        
        /* Sağ tərəfdəki görünən və toxunulan düymələr */
        .side-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .action-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); transition: transform 0.2s; pointer-events: auto; }
        .action-btn:active { transform: scale(0.9); }

        /* Məlumat bölməsi */
        .info-box { position: absolute; bottom: 110px; left: 15px; right: 85px; color: white; z-index: 40; pointer-events: auto; }
        .price-tag { background: #16a34a; color: white; padding: 6px 15px; border-radius: 8px; font-weight: 900; font-size: 20px; display: inline-block; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <div class="main-container" id="feed">
        </div>

    <div class="fixed bottom-0 left-0 w-full h-[85px] bg-black/90 border-t border-white/10 flex justify-around items-center z-[60] pb-5">
        <div class="flex flex-col items-center text-white"><i class="fas fa-home text-xl"></i><span class="text-[10px] mt-1">Əsas</span></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-search text-xl"></i><span class="text-[10px] mt-1">Axtar</span></div>
        <div class="bg-blue-600 w-14 h-12 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-500/20"><i class="fas fa-plus"></i></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-heart text-xl"></i><span class="text-[10px] mt-1">Seçilmiş</span></div>
        <div class="flex flex-col items-center text-gray-500"><i class="fas fa-user text-xl"></i><span class="text-[10px] mt-1">Profil</span></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="flex items-end justify-center h-full">
            <div class="bg-white w-full rounded-t-[35px] p-8 pb-12 animate-slide-up" onclick="event.stopPropagation()">
                <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-6"></div>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script>
        // TEST ÜÇÜN 5 REAL VİDEO DATA
        const ads = [
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-fast-pacing-running-shoes-in-a-field-34568-large.mp4', title: 'Nike Alphafly v2', price: '320', desc: 'Professional qaçış ayaqqabısı. Yeni kimidir, cəmi 1 dəfə qaçılıb.', tel: '994501234567', wp: '994501234567' },
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-car-driving-on-a-highway-at-night-34547-large.mp4', title: 'BMW M5 F90', price: '125000', desc: 'Full komplektasiya, 600 at gücü. Heç bir problemi yoxdur.', tel: '994507654321', wp: '994507654321' },
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-set-of-luxury-watches-on-display-34533-large.mp4', title: 'Rolex Submariner', price: '18500', desc: 'Orijinal qutusunda, sənədləri qaydasındadır. 2023 model.', tel: '994551112233', wp: '994551112233' },
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-close-up-of-a-person-holding-an-iphone-34444-large.mp4', title: 'iPhone 15 Pro Max', price: '2450', desc: '256GB, Blue Titanium. Qarantiya davam edir.', tel: '994709998877', wp: '994709998877' },
            { video: 'https://assets.mixkit.co/videos/preview/mixkit-drone-shot-of-a-modern-villa-with-pool-34511-large.mp4', title: 'Mərdəkan Villa', price: '450000', desc: '6 sotda, 4 otaqlı, hovuzlu müasir bağ evi.', tel: '994505554433', wp: '994505554433' }
        ];

        const container = document.getElementById('feed');

        function renderAds() {
            ads.forEach((ad, i) => {
                const section = `
                <div class="snap-section">
                    <video loop muted playsinline onclick="togglePlay(this)"><source src="${ad.video}"></video>
                    <div class="overlay"></div>
                    
                    <div class="side-bar">
                        <button class="action-btn bg-white/10" onclick="this.style.color='red'"><i class="fas fa-heart"></i></button>
                        <button class="action-btn bg-white/10" onclick="shareAd('${ad.title}', '${ad.price}')"><i class="fas fa-share"></i></button>
                        <a href="https://wa.me/${ad.wp}" class="action-btn bg-green-500"><i class="fab fa-whatsapp"></i></a>
                        <a href="tel:${ad.tel}" class="action-btn bg-blue-500"><i class="fas fa-phone"></i></a>
                    </div>

                    <div class="info-box">
                        <div class="price-tag">${ad.price} AZN</div>
                        <h2 class="text-2xl font-bold mb-3">${ad.title}</h2>
                        <button onclick="openModal(${i})" class="bg-white text-black py-3 px-8 rounded-xl font-black w-full shadow-xl flex items-center justify-center gap-2">
                            <i class="fas fa-info-circle"></i> Ətraflı Məlumat
                        </button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', section);
            });
        }

        function togglePlay(v) { v.paused ? v.play() : v.pause(); }

        function openModal(index) {
            const ad = ads[index];
            document.getElementById('modalBody').innerHTML = `
                <h3 class="text-2xl font-extrabold mb-1">${ad.title}</h3>
                <p class="text-green-600 text-2xl font-bold mb-4">${ad.price} AZN</p>
                <div class="bg-gray-100 p-4 rounded-2xl text-gray-700 mb-8 leading-relaxed">${ad.desc}</div>
                <div class="grid grid-cols-2 gap-4">
                    <a href="tel:${ad.tel}" class="bg-blue-600 text-white py-4 rounded-xl font-bold text-center"><i class="fas fa-phone mr-2"></i> Zəng Et</a>
                    <a href="https://wa.me/${ad.wp}" class="bg-green-500 text-white py-4 rounded-xl font-bold text-center"><i class="fab fa-whatsapp mr-2"></i> WhatsApp</a>
                </div>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function shareAd(title, price) {
            if (navigator.share) {
                navigator.share({ title: 'TeleMarket', text: `${title} - ${price} AZN. TeleMarket-də bax!`, url: window.location.href });
            }
        }

        // Avtomatik video oynatma (Sürüşdürəndə)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.play(); else e.target.pause(); });
        }, { threshold: 0.7 });

        window.onload = () => {
            renderAds();
            document.querySelectorAll('video').forEach(v => observer.observe(v));
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Mesh - Blue Edition</title>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* MAVİ TEMALI RƏNGLƏR */
            --em-blue: #0088cc; /* WhatsApp-ın mavi versiyası */
            --em-dark-blue: #0077b5;
            --em-light-blue: #e1f5fe; 
            --em-bg: #f0f2f5; 
            --em-sent-msg: #e3f2fd; 
            --em-header-text: #ffffff;
            --em-inactive-tab: rgba(255,255,255,0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: var(--em-bg); overflow: hidden; height: 100vh; }

        /* HEADER */
        .header-container { background: var(--em-blue); color: var(--em-header-text); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 18px 5px; }
        .header-top h2 { margin: 0; font-size: 21px; font-weight: 600; }
        .header-top .icons { display: flex; gap: 20px; font-size: 19px; }
        
        .tabs { display: flex; text-transform: uppercase; font-weight: 600; font-size: 14px; padding-top: 10px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; color: var(--em-inactive-tab); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        /* SECTIONS */
        .main-section { display: none; height: calc(100vh - 105px); overflow-y: auto; background: white; }
        .main-section.active { display: block; }

        /* CHAT LIST & ITEMS */
        .chat-item, .status-item { display: flex; padding: 12px 18px; border-bottom: 1px solid #f2f2f2; align-items: center; cursor: pointer; position: relative;}
        .avatar { width: 50px; height: 50px; background: #ccc; border-radius: 50%; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-info { flex: 1; }
        .chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-top h4 { margin: 0; font-size: 16px; color: #000; }
        .chat-time { font-size: 12px; color: #888; }
        .chat-msg-preview { font-size: 14px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }

        /* MY ID & COPY STYLES */
        .my-id-box { background: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 8px solid #f0f2f5; }
        .id-display { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--em-blue); font-size: 18px; }
        .copy-btn { cursor: pointer; padding: 5px 10px; background: var(--em-light-blue); border-radius: 5px; font-size: 12px; transition: 0.2s; }
        .copy-btn:active { background: #bbdefb; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e5ddd5; display: none; flex-direction: column; z-index: 2000; }
        .cw-header { background: var(--em-blue); color: white; padding: 10px; display: flex; align-items: center; }
        .cw-back { font-size: 20px; padding: 10px; cursor: pointer; }
        .cw-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; }
        .msg-bubble img { max-width: 100%; border-radius: 8px; display: block; margin-top: 5px; }
        .sent { align-self: flex-end; background: var(--em-sent-msg); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }

        /* INPUT AREA */
        .cw-input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-bar { flex: 1; background: white; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; }
        .input-bar input { flex: 1; border: none; padding: 10px; outline: none; font-size: 16px; }
        .input-bar i { color: #888; font-size: 20px; cursor: pointer; margin-left: 10px; }
        .send-btn { width: 45px; height: 45px; background: var(--em-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        /* STATUS */
        .status-circle { border: 2px solid var(--em-blue); padding: 2px; }

        /* FAB */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--em-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; cursor: pointer; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 3000; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 350px; text-align: center; display: none; z-index: 3001; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; }
        .btn-blue { background: var(--em-blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        
        #file-input { display: none; }
        #status-upload { display: none; }
        #profile-upload { display: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-top">
            <h2>Eco Mesh</h2>
            <div class="icons">
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">Söhbətlər</div>
            <div class="tab" onclick="switchTab('status')">Status</div>
            <div class="tab" onclick="switchTab('calls')">Zənglər</div>
        </div>
    </div>

    <div class="main-section active" id="section-chats">
        <div class="my-id-box">
            <div class="id-display">
                <span>ID:</span>
                <span id="display-my-id">------</span>
            </div>
            <div class="copy-btn" onclick="copyMyId()">
                <i class="fas fa-copy"></i> Kopyala
            </div>
        </div>
        <div id="chat-list">
            </div>
    </div>

    <div class="main-section" id="section-status">
        <div class="status-item" onclick="triggerStatusUpload()">
            <div class="avatar" id="my-status-avatar"><i class="fas fa-plus"></i></div>
            <div class="chat-info">
                <h4>Mənim statusum</h4>
                <p>Statusa şəkil əlavə et</p>
            </div>
        </div>
        <div style="padding: 10px 18px; font-size: 13px; color: var(--em-blue); font-weight: bold;">BAXILAN YENİLƏMƏLƏR</div>
        <div id="status-list"></div>
    </div>

    <div class="main-section" id="section-calls">
        <div style="text-align: center; margin-top: 50px; color: #888;">Zəng tarixçəsi boşdur</div>
    </div>

    <div class="fab" onclick="showAddContact()">
        <i class="fas fa-comment-medical"></i>
    </div>

    <div id="chat-window">
        <div class="cw-header">
            <i class="fas fa-arrow-left cw-back" onclick="closeChat()"></i>
            <div class="avatar" style="width: 35px; height: 35px; margin-right: 10px;" id="cw-avatar"></div>
            <div style="flex: 1">
                <h4 id="cw-name" style="margin: 0; font-size: 16px;">Ad</h4>
                <small id="cw-status">onlayn</small>
            </div>
            <div style="display: flex; gap: 20px; padding-right: 10px;">
                <i class="fas fa-video"></i>
                <i class="fas fa-phone"></i>
                <i class="fas fa-user-plus" onclick="shareContact()"></i>
            </div>
        </div>
        <div class="cw-messages" id="message-container"></div>
        <div class="cw-input-area">
            <div class="input-bar">
                <i class="far fa-smile"></i>
                <input type="text" id="msg-input" placeholder="Mesaj yazın...">
                <i class="fas fa-camera" onclick="openCamera()"></i>
                <i class="fas fa-image" onclick="openGallery()"></i>
            </div>
            <div class="send-btn" onclick="handleSend()">
                <i class="fas fa-paper-plane" id="send-icon"></i>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="hideModals()"></div>
    <div class="modal" id="add-modal">
        <h3>Yeni Söhbət</h3>
        <p>Dostunun 6 rəqəmli ID-sini yaz:</p>
        <input type="text" id="friend-id-input" maxlength="6" placeholder="123456">
        <button class="btn-blue" onclick="startNewChat()">BAŞLA</button>
    </div>

    <input type="file" id="file-input" accept="image/*">
    <input type="file" id="status-upload" accept="image/*" onchange="handleStatusUpload(event)">

    <script>
        const peer = new Peer(generate6DigitId());
        let myId = "";
        let currentConn = null;
        let activeChatId = null;
        const contacts = JSON.parse(localStorage.getItem('contacts') || '{}');
        const statuses = JSON.parse(localStorage.getItem('statuses') || '[]');

        function generate6DigitId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        peer.on('open', (id) => {
            myId = id;
            document.getElementById('display-my-id').innerText = myId;
            renderChats();
        });

        // Mesaj gələndə
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                handleIncomingData(conn.peer, data);
            });
        });

        function handleIncomingData(senderId, data) {
            if(!contacts[senderId]) {
                contacts[senderId] = { id: senderId, messages: [], avatar: `https://i.pravatar.cc/150?u=${senderId}` };
            }
            
            if(data.type === 'status') {
                statuses.unshift({ id: senderId, img: data.img, time: 'İndi' });
                localStorage.setItem('statuses', JSON.stringify(statuses));
                renderStatus();
                return;
            }

            contacts[senderId].messages.push({
                type: 'received',
                text: data.text || null,
                img: data.img || null,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            
            saveAndRender();
        }

        function handleSend() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !currentConn) return;

            const msg = { text: text, type: 'sent' };
            currentConn.send(msg);
            
            contacts[activeChatId].messages.push({
                ...msg,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            
            input.value = "";
            saveAndRender();
        }

        function openCamera() {
            // TWA/Mobil üçün birbaşa kamera açılması üçün capture əlavə edilə bilər
            document.getElementById('file-input').setAttribute('capture', 'environment');
            document.getElementById('file-input').click();
        }

        function openGallery() {
            document.getElementById('file-input').removeAttribute('capture');
            document.getElementById('file-input').click();
        }

        document.getElementById('file-input').onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgData = event.target.result;
                if(currentConn) {
                    currentConn.send({ img: imgData });
                    contacts[activeChatId].messages.push({
                        type: 'sent',
                        img: imgData,
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    });
                    saveAndRender();
                }
            };
            reader.readAsDataURL(file);
        };

        function triggerStatusUpload() {
            document.getElementById('status-upload').click();
        }

        function handleStatusUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = event.target.result;
                statuses.unshift({ id: 'Mən', img: img, time: 'İndi' });
                // P2P olduğu üçün aktiv kontaktlara statusu göndər
                Object.keys(contacts).forEach(cid => {
                    const conn = peer.connect(cid);
                    conn.on('open', () => conn.send({ type: 'status', img: img }));
                });
                localStorage.setItem('statuses', JSON.stringify(statuses));
                renderStatus();
            };
            reader.readAsDataURL(file);
        }

        function shareContact() {
            const contactInfo = `Mənim Eco Mesh ID-im: ${myId}`;
            const input = document.getElementById('msg-input');
            input.value = contactInfo;
            handleSend();
        }

        function copyMyId() {
            navigator.clipboard.writeText(myId);
            alert("ID kopyalandı!");
        }

        function renderChats() {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            Object.values(contacts).forEach(c => {
                const lastMsg = c.messages[c.messages.length - 1];
                const preview = lastMsg ? (lastMsg.img ? "📸 Şəkil" : lastMsg.text) : "Söhbətə başla";
                list.innerHTML += `
                    <div class="chat-item" onclick="openChat('${c.id}')">
                        <div class="avatar"><img src="${c.avatar}"></div>
                        <div class="chat-info">
                            <div class="chat-top"><h4>ID: ${c.id}</h4><span class="chat-time">${lastMsg?.time || ''}</span></div>
                            <div class="chat-msg-preview">${preview}</div>
                        </div>
                    </div>
                `;
            });
        }

        function renderStatus() {
            const list = document.getElementById('status-list');
            list.innerHTML = "";
            statuses.forEach(s => {
                list.innerHTML += `
                    <div class="status-item">
                        <div class="avatar status-circle"><img src="${s.img}"></div>
                        <div class="chat-info">
                            <h4>${s.id}</h4>
                            <p>${s.time}</p>
                        </div>
                    </div>
                `;
            });
        }

        function openChat(id) {
            activeChatId = id;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('cw-name').innerText = "ID: " + id;
            document.getElementById('cw-avatar').innerHTML = `<img src="${contacts[id].avatar}">`;
            
            currentConn = peer.connect(id);
            currentConn.on('open', () => {
                document.getElementById('cw-status').innerText = "onlayn";
            });
            
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('message-container');
            container.innerHTML = "";
            contacts[activeChatId].messages.forEach(m => {
                const content = m.img ? `<img src="${m.img}">` : m.text;
                container.innerHTML += `
                    <div class="msg-bubble ${m.type}">
                        ${content}
                        <span class="msg-time">${m.time}</span>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        }

        function saveAndRender() {
            localStorage.setItem('contacts', JSON.stringify(contacts));
            renderChats();
            if(activeChatId) renderMessages();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.main-section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`section-${tab}`).classList.add('active');
            if(tab === 'status') renderStatus();
        }

        function showAddContact() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('add-modal').style.display = 'block';
        }

        function hideModals() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('add-modal').style.display = 'none';
        }

        function startNewChat() {
            const id = document.getElementById('friend-id-input').value;
            if(id.length === 6) {
                if(!contacts[id]) {
                    contacts[id] = { id: id, messages: [], avatar: `https://i.pravatar.cc/150?u=${id}` };
                }
                hideModals();
                openChat(id);
            }
        }

        function closeChat() {
            document.getElementById('chat-window').style.display = 'none';
            activeChatId = null;
        }
    </script>
</body>
</html>
